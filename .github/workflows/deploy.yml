name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      - uses: actions/configure-pages@v4
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      # If Pages is still set to "Deploy from a branch", GitHub runs its own
      # legacy build for every push, racing this workflow and overwriting the
      # site with raw sources when it finishes last. Wait it out so our built
      # deployment always lands last. (Switching Pages source to "GitHub
      # Actions" makes this a no-op.)
      - name: Wait for legacy branch-based Pages build to finish
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          for i in $(seq 1 30); do
            status=$(curl -s -H "Authorization: Bearer $GH_TOKEN" \
              "https://api.github.com/repos/${{ github.repository }}/actions/runs?head_sha=${{ github.sha }}" \
              | jq -r '[.workflow_runs[] | select(.path == "dynamic/pages/pages-build-deployment")][0].status // "none"')
            echo "legacy pages build status: $status"
            if [ "$status" = "none" ] || [ "$status" = "completed" ]; then
              break
            fi
            sleep 10
          done
      - id: deployment
        uses: actions/deploy-pages@v4
